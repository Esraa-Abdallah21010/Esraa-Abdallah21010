name: GitHub Stats

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Stats SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: "header, repositories"
          template: classic
          config: |
            output: "output/generated/"
            filename: "overview"
            svg: true

      - name: Generate Languages SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: "languages"
          template: classic
          config: |
            output: "output/generated/"
            filename: "languages"
            svg: true
